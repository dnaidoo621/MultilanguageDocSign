apiVersion: v1
kind: Namespace
metadata:
  name: linguasign
---
# Copy to a real secret and fill in values — DO NOT commit the real one.
apiVersion: v1
kind: Secret
metadata:
  name: linguasign-secrets
  namespace: linguasign
type: Opaque
stringData:
  ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=linguasign;Username=postgres;Password=CHANGE_ME"
  Supabase__Url: "https://YOUR-PROJECT.supabase.co"
  # Leave empty for asymmetric-key (JWKS) Supabase projects; set only for legacy HS256.
  Supabase__JwtSecret: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: linguasign
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"
