apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: linguasign
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: linguasign
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          # On a GPU node, add: resources.limits["nvidia.com/gpu"]: 1 and use the CUDA runtime.
          resources:
            requests:
              cpu: "2"
              memory: 6Gi
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: linguasign
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
