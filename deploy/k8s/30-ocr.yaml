apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr
  namespace: linguasign
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocr
  template:
    metadata:
      labels:
        app: ocr
    spec:
      containers:
        - name: ocr
          image: linguasign/ocr:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ocr
  namespace: linguasign
spec:
  selector:
    app: ocr
  ports:
    - port: 8000
      targetPort: 8000
