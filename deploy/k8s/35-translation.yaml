apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: translation-models
  namespace: linguasign
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi    # ~100 MB for ko-en INT8; 1 Gi leaves room for ~8 language pairs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: translation
  namespace: linguasign
spec:
  replicas: 1
  selector:
    matchLabels:
      app: translation
  template:
    metadata:
      labels:
        app: translation
    spec:
      containers:
        - name: translation
          image: linguasign/translation:latest
          ports:
            - containerPort: 8001
          env:
            - name: TRANSLATION_PRELOAD
              value: "ko-en"
          resources:
            requests:
              cpu: "1"
              memory: 512Mi    # MarianMT INT8 ko-en: ~400-500 MB at inference
            limits:
              memory: 1Gi
          volumeMounts:
            - name: models
              mountPath: /app/models
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15    # Much faster cold start than Ollama
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: translation-models
---
apiVersion: v1
kind: Service
metadata:
  name: translation
  namespace: linguasign
spec:
  selector:
    app: translation
  ports:
    - port: 8001
      targetPort: 8001
