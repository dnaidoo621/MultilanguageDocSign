apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: api-storage
  namespace: linguasign
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: linguasign
spec:
  replicas: 1 # migrate-on-startup assumes a single replica; use a migration Job to scale out
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: linguasign/api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: Ocr__BaseUrl
              value: "http://ocr:8000"
            - name: Llm__BaseUrl
              value: "http://ollama:11434/v1"
            - name: Llm__Model
              value: "qwen2.5:7b"
            - name: Storage__LocalRoot
              value: "/data/storage"
            - name: Cors__Origins
              value: "https://app.example.com"
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: linguasign-secrets
                  key: ConnectionStrings__Postgres
            - name: Supabase__Url
              valueFrom:
                secretKeyRef:
                  name: linguasign-secrets
                  key: Supabase__Url
            - name: Supabase__JwtSecret
              valueFrom:
                secretKeyRef:
                  name: linguasign-secrets
                  key: Supabase__JwtSecret
          volumeMounts:
            - name: storage
              mountPath: /data/storage
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: api-storage
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: linguasign
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
