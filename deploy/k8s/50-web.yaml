apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: linguasign
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          # NEXT_PUBLIC_* values are baked at image build time — see frontend/Dockerfile.
          image: linguasign/web:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: linguasign
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
