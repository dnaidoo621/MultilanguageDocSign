apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linguasign
  namespace: linguasign
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m" # allow larger PDF uploads
spec:
  rules:
    - host: app.example.com # front end
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
    - host: api.example.com # backend API
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
