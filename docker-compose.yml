# Local development dependencies.
#   docker compose up -d                 # Postgres only
#   docker compose --profile ocr up      # also build/run the Surya OCR sidecar (CPU-only)
#
# On Apple Silicon the OCR sidecar is faster run natively (MPS) — see ml/ocr-sidecar/README.md.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linguasign
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ocr-sidecar:
    build: ./ml/ocr-sidecar
    ports:
      - "8000:8000"
    profiles: ["ocr"]

volumes:
  pgdata:
